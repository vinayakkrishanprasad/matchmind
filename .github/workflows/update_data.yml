name: Update MatchMind Data

on:
  schedule:
    # Every 6 hours — 00:00, 06:00, 12:00, 18:00 UTC
    # During active match days, edit to run every 2 hours:
    #   - cron: '0 */2 * * *'
    - cron: '0 */6 * * *'

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push updated data files

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data pipeline
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python scripts/update_data.py

      - name: Commit and push updated data
        run: |
          git config user.name "MatchMind Bot"
          git config user.email "bot@matchmind.io"
          git add data/
          # Only commit if there are actual changes
          git diff --staged --quiet || git commit -m "auto: data update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
